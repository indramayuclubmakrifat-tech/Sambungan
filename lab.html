 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER LAB - INDRAMAYUCLUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <style>
        /* Desain Dasar Blue Core */
        body { background: #000; color: #00d4ff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header Navigasi & Pencarian */
        header { height: 70px; background: #000b1a; border-bottom: 2px solid #00d4ff; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .search-area { flex: 1; display: flex; gap: 10px; }
        input#url-input { flex: 1; background: #000; border: 1px solid #00d4ff; color: #fff; padding: 10px; border-radius: 5px; }
        
        /* Area Kerja Besar */
        main { flex: 1; display: flex; }
        #editor { width: 50%; height: 100%; border-right: 1px solid #003366; }
        #preview-container { width: 50%; display: flex; flex-direction: column; background: #fff; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; background: #000; }

        /* Footer Monitoring */
        footer { height: 50px; background: #000b1a; border-top: 2px solid #003366; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; font-size: 12px; }
        .storage-bar { width: 200px; height: 10px; background: #001a33; border: 1px solid #00d4ff; border-radius: 5px; overflow: hidden; }
        .fill { width: 75%; height: 100%; background: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        
        button { cursor: pointer; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-blue { background: #00d4ff; color: #000; }
        .btn-green { background: #00ff00; color: #000; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; min-width: 150px;">INDRAMAYUCLUB</div>
    <div class="search-area">
        <input type="text" id="url-input" placeholder="Tempel URL Web/Database di sini...">
        <button class="btn-blue" onclick="fetchContent()">CARI & AMBIL</button>
    </div>
    <button class="btn-green" onclick="saveProject()">SIMPAN (PIN 000555)</button>
</header>

<main>
    <div id="editor"></div>
    <div id="preview-container">
        <div style="background:#001a33; color:#00d4ff; text-align:center; font-size:11px; padding:5px;">REAL-TIME PREVIEW</div>
        <iframe id="preview"></iframe>
    </div>
</main>

<footer>
    <div>Admin: <strong>JAMHARI DULKOHAR</strong> | PIN: 000555 Aktif</div>
    <div style="display: flex; align-items: center; gap: 10px;">
        Kapasitas Google One (100GB):
        <div class="storage-bar"><div class="fill"></div></div>
        <span>75% Terpakai</span>
    </div>
</footer>

<script>
    // Inisialisasi Editor Ace
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/tomorrow_night_eighties");
    editor.session.setMode("ace/mode/html");

    // Fungsi Preview Otomatis
    var preview = document.getElementById('preview');
    editor.session.on('change', function() {
        var code = editor.getValue();
        var doc = preview.contentDocument || preview.contentWindow.document;
        doc.open(); doc.write(code); doc.close();
    });

    // Fungsi Mengambil Konten Web/Database
    async function fetchContent() {
        const url = document.getElementById('url-input').value;
        if(!url) return alert("Masukkan URL!");
        editor.setValue("");
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            editor.setValue(data.contents);
        } catch (e) { alert("Gagal mengambil data."); }
    }

    // Fungsi Simpan Proyek
    function saveProject() {
        let confirmPin = prompt("Konfirmasi PIN Admin:");
        if(confirmPin === "000555") {
            alert("Proyek berhasil disimpan ke Database Indramayuclub!");
        } else {
            alert("Akses Ditolak! PIN Salah.");
        }
    }
</script>
