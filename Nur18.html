<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NUR REMOTE IMC-001</title>
<style>
  body{background:#0D0D0D;color:#C9A84C;font-family:sans-serif;margin:0;text-align:center}
  .wrap{max-width:420px;margin:0 auto;padding:20px}
  h1{color:#C9A84C;text-shadow:0 0 10px #C9A84C;font-size:24px;margin-bottom:20px}
  .btn{background:#1A1A1A;border:2px solid #C9A84C;color:#C9A84C;
       padding:15px;margin:8px 0;border-radius:12px;width:100%;font-size:18px;cursor:pointer;
       box-sizing:border-box;font-weight:bold;transition:all 0.1s ease;}
  .btn:active{background:#C9A84C;color:#0D0D0D}
  .back{font-size:16px;margin-top:20px;color:#888;cursor:pointer;font-weight:bold}
  .back:hover{color:#C9A84C}
  #status{margin-top:15px;font-size:14px;min-height:20px;font-family:monospace;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>

<script>
// === 1. DATABASE NUR = EDIT DI SINI ===
const dataNur = {
  home: {
    judul: "NUR REMOTE", 
    isi: `
      <p style="color:#888; margin-bottom:15px;">Pilih Gerbang IMC-001</p>
      ${[...Array(19)].map((_,i)=>`<button class="btn" onclick="buka('Nur${i+1}')">NUR ${i+1}</button>`).join('')}
    `
  },
  Nur1:  {judul:"NUR 1 RUANG TAMU", isi:`<button class="btn" onclick="tembak('Nur1')">ON / OFF</button>`},
  Nur2:  {judul:"NUR 2 KAMAR", isi:`<button class="btn" onclick="tembak('Nur2')">ON / OFF</button>`},
  Nur3:  {judul:"NUR 3 DAPUR", isi:`<button class="btn" onclick="tembak('Nur3')">ON / OFF</button>`},
  Nur4:  {judul:"NUR 4", isi:`<button class="btn" onclick="tembak('Nur4')">ON / OFF</button>`},
  Nur5:  {judul:"NUR 5", isi:`<button class="btn" onclick="tembak('Nur5')">ON / OFF</button>`},
  Nur6:  {judul:"NUR 6", isi:`<button class="btn" onclick="tembak('Nur6')">ON / OFF</button>`},
  Nur7:  {judul:"NUR 7", isi:`<button class="btn" onclick="tembak('Nur7')">ON / OFF</button>`},
  Nur8:  {judul:"NUR 8", isi:`<button class="btn" onclick="tembak('Nur8')">ON / OFF</button>`},
  Nur9:  {judul:"NUR 9", isi:`<button class="btn" onclick="tembak('Nur9')">ON / OFF</button>`},
  Nur10: {judul:"NUR 10", isi:`<button class="btn" onclick="tembak('Nur10')">ON / OFF</button>`},
  Nur11: {judul:"NUR 11", isi:`<button class="btn" onclick="tembak('Nur11')">ON / OFF</button>`},
  Nur12: {judul:"NUR 12", isi:`<button class="btn" onclick="tembak('Nur12')">ON / OFF</button>`},
  Nur13: {judul:"NUR 13", isi:`<button class="btn" onclick="tembak('Nur13')">ON / OFF</button>`},
  Nur14: {judul:"NUR 14", isi:`<button class="btn" onclick="tembak('Nur14')">ON / OFF</button>`},
  Nur15: {judul:"NUR 15", isi:`<button class="btn" onclick="tembak('Nur15')">ON / OFF</button>`},
  Nur16: {judul:"NUR 16", isi:`<button class="btn" onclick="tembak('Nur16')">ON / OFF</button>`},
  Nur17: {judul:"NUR 17", isi:`<button class="btn" onclick="tembak('Nur17')">ON / OFF</button>`},
  Nur18: {judul:"NUR 18", isi:`<button class="btn" onclick="tembak('Nur18')">ON / OFF</button>`},
  Nur19: {judul:"NUR 19 GERBANG", isi:`<button class="btn" onclick="tembak('Nur19')">BUKA GERBANG</button>`},
}

// === 2. MESIN ROUTING ===
function render(){
  const page = window.location.hash.replace('#','') || 'home';
  const d = dataNur[page] || dataNur.home;
  document.getElementById('app').innerHTML = `
    <h1>${d.judul}</h1>
    ${d.isi}
    ${page!=='home'?'<div class="back" onclick="buka(\'home\')">← Kembali</div>':''}
    <div id="status"></div>
  `;
}

function buka(page){ window.location.hash = page; }

async function tembak(nur){
  const statusDiv = document.getElementById('status');
  statusDiv.style.color = '#C9A84C';
  statusDiv.innerText = 'Mengeksekusi... ⏳';
  try {
    const res = await fetch('https://nur-api.onrender.com/exec?page='+nur); 
    const hasil = await res.text(); 
    statusDiv.innerText = hasil;
  } catch (error) {
    statusDiv.style.color = '#FF6B6B';
    statusDiv.innerText = 'Gagal tersambung ke API ❌';
  }
}

window.onhashchange = render;
render();
</script>
</body>
</html>
