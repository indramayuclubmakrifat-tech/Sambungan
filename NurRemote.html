<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --emas: #c9a84c; --hitam: #0d0d0d; --hijau: #1a6b3a; --teks: #e8d5a0; }
        body { background: var(--hitam); color: var(--teks); font-family: 'Cinzel', serif; padding: 20px; }
        h2 { color: var(--emas); text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--emas); padding-bottom: 10px; }
        .grid-19 { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .btn-nur { 
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            border: 1px solid var(--emas); color: var(--emas);
            padding: 15px 5px; border-radius: 8px; text-decoration: none;
            text-align: center; font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn-nur:hover { background: var(--hijau); color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h2>🛡️ KENDALI 19 NUR</h2>
    <div class="grid-19">
        <script>
            // Link deployment ID terbaru dari terminal Bapak (@12)
            const baseUrl = "https://script.google.com/macros/s/AKfycby1kDn65_fvJVEuUqQj5lvTBWxhxRamXWUIWGUbtWNS47TkFCq3W4LsRJDauYCttEB45g/exec";
            
            for(let i = 1; i <= 19; i++) {
                document.write(`<a href="${baseUrl}?page=Nur${i}" class="btn-nur">NUR ${i}</a>`);
            }
        </script>
    </div>

<!-- SIRKUIT TOMBOL OTOMATIS BACK & NEXT -->
<div class="sirkuit-navigasi" style="text-align: center; margin: 30px 0; padding: 10px;">
    <button onclick="window.location.href='Nur9.html'" style="padding: 10px 20px; font-weight: bold; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
        ⬅️ BACK (Nur9.html)
    </button>
    <button onclick="window.location.href='RAJA👑.html'" style="padding: 10px 20px; font-weight: bold; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer;">
        NEXT (RAJA👑.html) ➡️
    </button>
</div>
<!-- END SIRKUIT TOMBOL OTOMATIS -->

</body>
</html>
